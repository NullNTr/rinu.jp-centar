<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO rinu逆探知</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'SF Mono',monospace;
  background:#01030a;
  color:#0ff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* 背景 */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  linear-gradient(#0ff1 1px,transparent 1px),
  linear-gradient(90deg,#0ff1 1px,transparent 1px);
  background-size:50px 50px;
  animation:bgMove 15s linear infinite;
}
@keyframes bgMove{
  from{background-position:0 0;}
  to{background-position:50px 50px;}
}

/* カード */
.box{
  width:95%;
  max-width:600px;
  background:rgba(0,0,0,0.6);
  border:1px solid #0ff4;
  border-radius:20px;
  padding:25px;
  backdrop-filter:blur(15px);
  box-shadow:0 0 30px #0ff3;
}

/* タイトル */
h1{
  text-align:center;
  margin-bottom:20px;
  letter-spacing:4px;
  text-shadow:0 0 15px #0ff;
}

/* 入力エリア */
.input-group{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input{
  flex:1;
  padding:12px;
  border-radius:50px;
  border:1px solid #0ff;
  background:#001018;
  color:#0ff;
  outline:none;
  transition:.2s;
}
input:focus{
  box-shadow:0 0 10px #0ff;
}

/* ボタン */
button{
  padding:10px 18px;
  border-radius:50px;
  border:1px solid #0ff;
  background:#001018;
  color:#0ff;
  cursor:pointer;
  transition:.2s;
}
button:hover{
  background:#0ff;
  color:#000;
  box-shadow:0 0 15px #0ff;
}

/* 状態 */
#loading{
  margin-top:10px;
  font-size:14px;
}

/* 結果 */
#detail{
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  background:#000c;
  border-left:3px solid #0ff;
  font-size:14px;
}

/* ログ */
.log{
  margin-top:15px;
  background:#000c;
  border-radius:10px;
  padding:10px;
  height:140px;
  overflow:auto;
  font-size:12px;
}
.log div{
  margin-bottom:4px;
  opacity:0;
  animation:fade .3s forwards;
}
@keyframes fade{
  to{opacity:1;}
}

/* スクロール */
.log::-webkit-scrollbar{
  width:4px;
}
.log::-webkit-scrollbar-thumb{
  background:#0ff;
}
</style>
</head>

<body>

<div class="box">
<h1>NEO TRACE</h1>

<div class="input-group">
  <input id="url" placeholder="https://rinu.jp/xxxx">
  <button onclick="check()">▶</button>
  <button onclick="paste()">📋</button>
</div>

<div id="loading"></div>
<div id="detail"></div>
<div class="log" id="log"></div>
</div>

<script>
const log=(m)=>{
  let l=document.getElementById("log");
  let d=document.createElement("div");
  d.textContent="> "+m;
  l.appendChild(d);
  l.scrollTop=l.scrollHeight;
};

function getParam(name,url){
  if(!url)url=location.href;
  name=name.replace(/[\[\]]/g,"\\$&");
  let r=new RegExp("[?&]"+name+"(=([^&#]*)|&|#|$)").exec(url);
  if(!r)return null;
  if(!r[2])return '';
  return decodeURIComponent(r[2].replace(/\+/g," "));
}

async function check(){
  let load=document.getElementById("loading");
  let detail=document.getElementById("detail");
  let url=document.getElementById("url").value.trim();

  load.textContent="スキャン中...";
  detail.textContent="";
  log("開始: "+url);

  if(!/^https?:\/\/rinu\.(cf|jp)\//.test(url)){
    load.textContent="URLが違う";
    log("エラー");
    return;
  }

  let code=url.split("/").pop();

  try{
    let dat=await (await fetch(`https://api.activetk.jp/urlmin/get&code=${code}`)).json();

    if(dat.status!=="OK"){
      load.textContent="エラー";
      log("APIエラー");
      return;
    }

    let go=dat.LinkURL;
    if(go.includes("tokutei")) go=getParam("url",go);

    let ipinfo=await (await fetch(`https://ipinfo.io/${dat.CreatorInfo.IPAddress}/json`)).json();

    load.textContent="完了";
    log("成功");

    detail.innerHTML=`
IP: ${dat.CreatorInfo.IPAddress}<br>
場所: ${dat.CreatorInfo.Location}<br>
ASN: ${ipinfo.org||"?"}<br><br>
<a href="${go}" target="_blank">→ ${go}</a>
`;

  }catch{
    load.textContent="通信エラー";
    log("失敗");
  }
}

async function paste(){
  try{
    let t=await navigator.clipboard.readText();
    document.getElementById("url").value=t;
    log("貼り付け");
    check();
  }catch{
    log("クリップ失敗");
  }
}
</script>

</body>
</html>
