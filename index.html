<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO rinu逆探知</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#02040a;
  color:#0ff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* 背景グリッド */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  linear-gradient(#0ff2 1px,transparent 1px),
  linear-gradient(90deg,#0ff2 1px,transparent 1px);
  background-size:40px 40px;
  animation:move 10s linear infinite;
}
@keyframes move{
  0%{background-position:0 0;}
  100%{background-position:40px 40px;}
}

.box{
  width:90%;
  max-width:700px;
  background:#000a;
  padding:20px;
  border-radius:15px;
  border:1px solid #0ff;
  box-shadow:0 0 20px #0ff5;
  backdrop-filter:blur(10px);
}

h1{
  text-align:center;
  letter-spacing:3px;
  text-shadow:0 0 10px #0ff;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:30px;
  border:1px solid #0ff;
  background:#001018;
  color:#0ff;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:30px;
  background:#001018;
  color:#0ff;
  border:1px solid #0ff;
  cursor:pointer;
  margin-right:10px;
  transition:.2s;
}
button:hover{
  background:#0ff;
  color:#000;
  box-shadow:0 0 15px #0ff;
}

#loading{
  margin-top:10px;
  min-height:20px;
}

#detail{
  background:#000c;
  margin-top:15px;
  padding:10px;
  border-radius:10px;
}

/* ログ */
.log{
  margin-top:15px;
  background:#000c;
  padding:10px;
  height:120px;
  overflow:auto;
  border-radius:10px;
  font-size:12px;
}
.log div{
  margin-bottom:5px;
  animation:fade .3s;
}
@keyframes fade{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="box">
<h1>NEO TRACE</h1>

<input id="url" placeholder="https://rinu.jp/xxxx">

<button onclick="check()">▶ 実行</button>
<button onclick="paste()">📋 貼り付け</button>

<div id="loading"></div>
<div id="detail"></div>

<div class="log" id="log"></div>
</div>

<script>
const log = (msg)=>{
  const l=document.getElementById("log");
  const d=document.createElement("div");
  d.textContent="> "+msg;
  l.appendChild(d);
  l.scrollTop=l.scrollHeight;
};

function getParam(name,url){
  if(!url)url=location.href;
  name=name.replace(/[\[\]]/g,"\\$&");
  let r=new RegExp("[?&]"+name+"(=([^&#]*)|&|#|$)").exec(url);
  if(!r)return null;
  if(!r[2])return '';
  return decodeURIComponent(r[2].replace(/\+/g," "));
}

async function check(){
  let load=document.getElementById("loading");
  let detail=document.getElementById("detail");
  let url=document.getElementById("url").value.trim();

  load.textContent="解析中...";
  detail.textContent="";
  log("開始: "+url);

  const rinu=/^https?:\/\/rinu\.(cf|jp)\//;

  if(!rinu.test(url)){
    load.textContent="URLが違う";
    log("エラー: 不正URL");
    return;
  }

  let code=url.split("/").pop();

  try{
    let dat=await (await fetch(`https://api.activetk.jp/urlmin/get&code=${code}`)).json();

    if(dat.status!=="OK"){
      load.textContent="エラー";
      log("404 or APIエラー");
      return;
    }

    let go=dat.LinkURL;
    if(go.includes("tokutei")) go=getParam("url",go);

    let ipinfo=await (await fetch(`https://ipinfo.io/${dat.CreatorInfo.IPAddress}/json`)).json();

    load.textContent="完了";
    log("成功: データ取得");

    detail.innerHTML=`
IP: ${dat.CreatorInfo.IPAddress}<br>
場所: ${dat.CreatorInfo.Location}<br>
ASN: ${ipinfo.org||"?"}<br><br>
URL: <a href="${go}" target="_blank">${go}</a>
`;

  }catch(e){
    load.textContent="通信エラー";
    log("通信失敗");
  }
}

async function paste(){
  try{
    let t=await navigator.clipboard.readText();
    document.getElementById("url").value=t;
    log("貼り付け");
    check();
  }catch{
    log("クリップボード失敗");
  }
}
</script>

</body>
</html>
